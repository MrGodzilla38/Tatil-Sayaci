name: tatil_sayaci
description: "Bir sonraki tatilin ne olduğunu ve kaç gün kaldığını gösteren mobil uygulama."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  table_calendar: ^3.2.0
  shared_preferences: ^2.5.0
  http: ^1.3.0
  html: ^0.15.5
  flutter_local_notifications: ^19.0.0
  intl: ^0.20.0
  timezone: ^0.10.1
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "app_icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "app_icon.png"
    background_color: "#ffffff"
    theme_color: "#4CAF50"
  windows:
    generate: true
    image_path: "app_icon.png"
  macos:
    generate: true
    image_path: "app_icon.png"

flutter:
  uses-material-design: true
